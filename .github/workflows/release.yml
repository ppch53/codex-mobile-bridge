name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --build
      - run: npx jest --no-cache
      - name: Package
        run: npm run package:windows
      - name: Verify executable
        run: |
          if (-not (Test-Path dist/codex-mobile-bridge.exe)) {
            Write-Error 'Executable not found after packaging'
            exit 1
          }
          Write-Host "Executable size: $((Get-Item dist/codex-mobile-bridge.exe).Length / 1MB) MB"
        shell: pwsh
      - name: Smoke test packaged exe
        run: npm run smoke:package
      - name: Create distribution zip
        run: |
          $distDir = 'dist'
          $zipName = 'codex-mobile-bridge-windows-x64.zip'
          $staging = Join-Path $distDir 'staging'
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item "$distDir/codex-mobile-bridge.exe" $staging
          Copy-Item "$distDir/web" (Join-Path $staging 'web') -Recurse
          Copy-Item 'scripts/install-service.ps1' $staging
          Copy-Item 'scripts/uninstall-service.ps1' $staging
          Copy-Item 'scripts/bridge-status.ps1' $staging
          Copy-Item '.env.example' $staging
          Copy-Item 'README.md' $staging
          Compress-Archive -Path "$staging/*" -DestinationPath "$distDir/$zipName" -Force
          Remove-Item $staging -Recurse -Force
          Write-Host "Created $zipName"
        shell: pwsh
      - name: Generate checksum
        run: |
          $hash = (Get-FileHash dist/codex-mobile-bridge-windows-x64.zip -Algorithm SHA256).Hash
          "$hash  codex-mobile-bridge-windows-x64.zip" | Out-File -Encoding ascii dist/codex-mobile-bridge-windows-x64.zip.sha256
          Write-Host "SHA256: $hash"
        shell: pwsh
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/codex-mobile-bridge-windows-x64.zip
            dist/codex-mobile-bridge-windows-x64.zip.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
