name: Windows E2E

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  e2e:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --build
      - run: npx jest --no-cache
      - name: Run e2e mock tests
        run: npx jest --config jest.e2e.config.js --no-cache
